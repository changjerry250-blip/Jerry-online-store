<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big J Online Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Big J Online Store</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search snacks or drinks..." onkeyup="filterProducts()">
        </div>
    </header>

    <main>
        <section id="product-list" class="product-grid">
            </section>

        <aside class="cart-sidebar">
            <h2>Your Cart</h2>
            <div id="cart-items-container">
                </div>
            <div class="cart-footer">
                <div class="total-row">
                    <span>Total:</span>
                    <span><strong id="total-price">0</strong> NTD</span>
                </div>
                <button id="checkout-btn" onclick="checkout()">Place Order</button>
                <button id="clear-btn" onclick="clearCart()">Clear All</button>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
