<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taiwan Essentials Mega Store</title>
    <style>
        :root {
            --primary: #1e272e;
            --accent: #ff3f34;
            --success: #05c46b;
            --bg: #f1f2f6;
        }

        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; min-height: 100vh; }
        
        header {
            background: var(--primary);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .main-layout {
            display: flex;
            flex-grow: 1;
            padding: 20px;
            gap: 20px;
        }

        /* Product Section */
        .store-section { flex: 3; }
        .controls { margin-bottom: 20px; }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .product-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            transition: 0.2s;
        }

        .product-card:hover { transform: scale(1.02); }

        .product-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
        }

        .info { padding: 12px; flex-grow: 1; }
        .info h3 { margin: 5px 0; font-size: 0.95rem; height: 40px; }
        .price { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; }

        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Checkout Sidebar */
        .checkout-sidebar {
            flex: 1;
            background: white;
            border-radius: 10px;
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 90px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-width: 280px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            padding: 10px 0;
            font-size: 0.9rem;
        }

        .total-section {
            margin-top: 20px;
            border-top: 2px solid #333;
            padding-top: 15px;
        }

        .checkout-btn {
            background: var(--success);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
        }

        .checkout-btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<header>
    <h1>🇹🇼 Taiwan Essentials Store</h1>
    <div>🛒 Items: <span id="cart-count">0</span></div>
</header>

<div class="main-layout">
    <div class="store-section">
        <div class="controls">
            <input type="text" id="searchBar" placeholder="Search for food, water, or pens..." onkeyup="filterProducts()">
        </div>
        <div class="product-grid" id="mainGrid"></div>
    </div>

    <aside class="checkout-sidebar">
        <h2>Your Cart</h2>
        <div id="cart-items">
            <p style="color: #888;">Your cart is empty.</p>
        </div>
        <div class="total-section">
            <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem;">
                <span>Total:</span>
                <span>NT$ <span id="cart-total">0</span></span>
            </div>
            <button class="checkout-btn" id="checkoutBtn" disabled onclick="handleCheckout()">Complete Order</button>
        </div>
    </aside>
</div>

        { name: "Trash Bags", price: 85, cat: "Home", img: "https://images.unsplash.com/photo-1591193512858-12ee99139611?w=400" },
        { name: "All Purpose Cleaner", price: 140, cat: "Home", img: "https://images.unsplash.com/photo-1584622781514-f63f728f3236?w=400" },
        { name: "Kitchen Towels", price: 110, cat: "Home", img: "https://images.unsplash.com/photo-1583947582383-a720616b3f74?w=400" }
    ];

    let cart = [];

    function displayProducts(items) {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";
        items.forEach((p, index) => {
            grid.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}" alt="${p.name}">
                    <div class="info">
                        <h3>${p.name}</h3>
                        <p class="price">NT$ ${p.price}</p>
                        <button class="add-btn" onclick="addToCart('${p.name}', ${p.price})">Add to Cart</button>
                    </div>
                </div>
            `;
        });
    }

    function addToCart(name, price) {
        cart.push({ name, price });
        updateCartUI();
    }

    function updateCartUI() {
        const cartItemsDiv = document.getElementById('cart-items');
        const cartCount = document.getElementById('cart-count');
        const cartTotal = document.getElementById('cart-total');
        const checkoutBtn = document.getElementById('checkoutBtn');

        cartCount.innerText = cart.length;
        
        if (cart.length === 0) {
            cartItemsDiv.innerHTML = '<p style="color: #888;">Your cart is empty.</p>';
            checkoutBtn.disabled = true;
        } else {
            cartItemsDiv.innerHTML = "";
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                cartItemsDiv.innerHTML += `
                    <div class="cart-item">
                        <span>${item.name}</span>
                        <span>NT$ ${item.price}</span>
                    </div>
                `;
            });
            cartTotal.innerText = total;
            checkoutBtn.disabled = false;
        }
    }

    function filterProducts() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        const filtered = products.filter(p => p.name.toLowerCase().includes(query));
        displayProducts(filtered);
    }

    function handleCheckout() {
        const total = document.getElementById('cart-total').innerText;
        alert(`Order Placed Successfully!\nTotal Amount: NT$ ${total}\nThank you for shopping at Taiwan Essentials!`);
        cart = [];
        updateCartUI();
    }

    displayProducts(products);
</script>
</body>
</html>
