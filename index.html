<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taiwan Essentials Store</title>
    <style>
        :root {
            --primary: #1e272e;
            --accent: #ff3f34;
            --success: #05c46b;
            --bg: #f1f2f6;
            --white: #ffffff;
        }

        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; margin: 0; background: var(--bg); color: var(--primary); }
        
        header {
            background: var(--primary);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav {
            background: #2f3640;
            display: flex;
            justify-content: center;
            padding: 10px;
            gap: 20px;
        }

        nav button {
            background: none;
            border: 1px solid #7f8c8d;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        nav button.active { background: var(--accent); border-color: var(--accent); }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        
        .page { display: none; }
        .page.active { display: block; }

        /* Store Layout */
        .store-layout { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        
        .product-card { background: var(--white); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .product-card img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            background-color: #eee; /* Fallback color */
        }
        .product-info { padding: 15px; }
        .price { color: var(--accent); font-weight: bold; font-size: 1.2rem; }

        .add-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 10px; border-radius: 6px; cursor: pointer; margin-top: 10px; font-weight: bold;}

        /* Sidebar & Forms */
        .card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .cart-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }

        .btn-large { background: var(--success); color: white; border: none; width: 100%; padding: 15px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .btn-large:disabled { background: #ccc; }

        /* History Table */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }

        @media (max-width: 900px) { .store-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>🇹🇼 Taiwan Essentials Mega Store</h1>
    <div>🛒 Items: <span id="cart-count">0</span></div>
</header>

<nav>
    <button onclick="showPage('store')" id="nav-store" class="active">Shop</button>
    <button onclick="showPage('checkout')" id="nav-checkout">Checkout</button>
    <button onclick="showPage('history')" id="nav-history">History</button>
</nav>

<div class="container">
    
    <div id="page-store" class="page active">
        <div class="store-layout">
            <div class="product-grid" id="mainGrid"></div>
            <div class="card">
                <h3>Current Cart</h3>
                <div id="sidebar-cart">Your cart is empty.</div>
                <hr>
                <div style="display: flex; justify-content: space-between; font-weight: bold;">
                    <span>Total:</span>
                    <span>NT$ <span id="cart-total">0</span></span>
                </div>
                <button class="add-btn" style="background: var(--success); margin-top: 15px;" onclick="showPage('checkout')">Go to Checkout</button>
            </div>
        </div>
    </div>

    <div id="page-checkout" class="page">
        <div style="max-width: 600px; margin: 0 auto;" class="card">
            <h2>Checkout</h2>
            <div id="checkout-summary" style="margin-bottom: 20px; padding: 10px; background: #f8f9fa; border-radius: 5px;"></div>
            
            <label>Recipient Name</label>
            <input type="text" id="custName" placeholder="Enter full name">
            
            <label>Payment Method</label>
            <select id="paymentMethod">
                <option value="EasyCard">EasyCard (悠遊卡)</option>
                <option value="LinePay">LinePay</option>
                <option value="Cash">Cash on Delivery</option>
            </select>

            <button class="btn-large" id="confirmBtn" onclick="processOrder()">Confirm Purchase</button>
        </div>
    </div>

    <div id="page-history" class="page">
        <h2>Your Purchase History</h2>
        <div class="card">
            <table id="historyTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Items Bought</th>
                        <th>Total Paid</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    const products = [
        { 
            name: "Sticky Notes", 
            price: 45, 
            img: "http://googleusercontent.com/image_collection/image_retrieval/13700377618104498131_0" 
        },
        { 
            name: "Sports Drink", 
            price: 30, 
            img: "http://googleusercontent.com/image_collection/image_retrieval/17736897105438930279_0" 
        },
        { 
            name: "Highlighters (Pack)", 
            price: 95, 
            img: "http://googleusercontent.com/image_collection/image_retrieval/12998527378642185047_0" 
        },
        { 
            name: "Correction Tape", 
            price: 40, 
            img: "http://googleusercontent.com/image_collection/image_retrieval/13979903056261504027_0" 
        },
        { 
            name: "Taiwanese Rice (2kg)", 
            price: 270, 
            img: "https://images.unsplash.com/photo-1586201375761-83865001e31c?w=400" 
        },
        { 
            name: "Medical Face Masks", 
            price: 150, 
            img: "https://images.unsplash.com/photo-1586942593568-29361efcd571?w=400" 
        }
    ];

    let cart = [];
    let history = JSON.parse(localStorage.getItem('shopHistory')) || [];

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.getElementById('nav-' + pageId).classList.add('active');
        if(pageId === 'history') updateHistoryUI();
        if(pageId === 'checkout') updateCheckoutSummary();
    }

    function displayProducts() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = products.map(p => `
            <div class="product-card">
                <img src="${p.img}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/400x300?text=Image+Loading...'">
                <div class="product-info">
                    <h3>${p.name}</h3>
                    <p class="price">NT$ ${p.price}</p>
                    <button class="add-btn" onclick="addToCart('${p.name}', ${p.price})">Add to Cart</button>
                </div>
            </div>
        `).join('');
    }

    function addToCart(name, price) {
        cart.push({ name, price });
        updateCartUI();
    }

    function updateCartUI() {
        const cartItemsDiv = document.getElementById('sidebar-cart');
        const cartTotal = document.getElementById('cart-total');
        document.getElementById('cart-count').innerText = cart.length;
        
        if (cart.length === 0) {
            cartItemsDiv.innerHTML = 'Your cart is empty.';
            cartTotal.innerText = "0";
        } else {
            let total = 0;
            cartItemsDiv.innerHTML = cart.map(item => {
                total += item.price;
                return `<div class="cart-item"><span>${item.name}</span><span>NT$ ${item.price}</span></div>`;
            }).join('');
            cartTotal.innerText = total;
        }
    }

    function updateCheckoutSummary() {
        const summary = document.getElementById('checkout-summary');
        if (cart.length === 0) {
            summary.innerHTML = "<strong>Your cart is empty.</strong>";
            document.getElementById('confirmBtn').disabled = true;
        } else {
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            summary.innerHTML = `<strong>Items:</strong> ${cart.length}<br><strong>Total:</strong> NT$ ${total}`;
            document.getElementById('confirmBtn').disabled = false;
        }
    }

    function processOrder() {
        const name = document.getElementById('custName').value;
        if (!name) return alert("Please enter your name for the record!");

        const total = cart.reduce((sum, item) => sum + item.price, 0);
        const order = {
            date: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString(),
            items: cart.map(i => i.name).join(", "),
            total: total
        };

        history.push(order);
        localStorage.setItem('shopHistory', JSON.stringify(history));
        
        alert(`Order successful! Receipt saved to History.`);
        cart = [];
        updateCartUI();
        showPage('history');
    }

    function updateHistoryUI() {
        const body = document.getElementById('historyBody');
        if (history.length === 0) {
            body.innerHTML = '<tr><td colspan="4" style="text-align:center">No previous purchases found.</td></tr>';
        } else {
            body.innerHTML = history.map(h => `
                <tr>
                    <td>${h.date}</td>
                    <td>${h.items}</td>
                    <td>NT$ ${h.total}</td>
                    <td><b style="color:var(--success)">✓ Paid</b></td>
                </tr>
            `).reverse().join('');
        }
    }

    displayProducts();
    updateHistoryUI();
</script>
</body>
</html>
