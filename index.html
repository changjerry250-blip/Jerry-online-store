<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big J Online Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Big J Online Store</h1>
    </header>

    <main>
        <section id="product-list" class="product-container">
            </section>

        <aside id="cart">
            <h2>Shopping Cart</h2>
            <ul id="cart-items"></ul>
            <hr>
            <p>Total: <span id="total-price">0</span> NTD</p>
            <button id="checkout-btn" onclick="checkout()">Checkout</button>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
