<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Online Essentials Store</title>
    <style>
        /* CSS: The Design */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #f9f9f9;
            color: #333;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .cart-status {
            background: #e74c3c;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .price {
            font-size: 1.2rem;
            color: #27ae60;
            font-weight: bold;
            margin: 10px 0;
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 6px;
            width: 100%;
            font-size: 1rem;
        }

        button:hover {
            background: #2980b9;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <h1>Essentials Shop</h1>
        <div class="cart-status">🛒 Cart: <span id="cart-count">0</span> items</div>
    </header>

    <div class="container">
        <div class="product-grid">
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=400" alt="Water">
                <h3>Mineral Water</h3>
                <p>Stay hydrated with fresh spring water.</p>
                <div class="price">$1.50</div>
                <button onclick="addToCart('Mineral Water', 1.50)">Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1585336261022-680e295ce3fe?w=400" alt="Pen">
                <h3>Premium Ink Pen</h3>
                <p>Smooth writing for office or school.</p>
                <div class="price">$0.75</div>
                <button onclick="addToCart('Premium Pen', 0.75)">Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1536304953831-ca14255ae2af?w=400" alt="Food">
                <h3>Healthy Snack Bar</h3>
                <p>The perfect energy boost for your day.</p>
                <div class="price">$2.00</div>
                <button onclick="addToCart('Snack Bar', 2.00)">Add to Cart</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 My Online Store Project</p>
    </footer>

    <script>
        // JavaScript: The Functionality
        let cartCount = 0;
        let totalPrice = 0;

        function addToCart(itemName, price) {
            cartCount++;
            totalPrice += price;
            
            // Update the UI
            document.getElementById('cart-count').innerText = cartCount;
            
            // Log the action (In a real store, this would save to a database)
            console.log(`Added ${itemName} to cart. Total: $${totalPrice.toFixed(2)}`);
            
            // Visual feedback
            alert(`${itemName} has been added! \nTotal items: ${cartCount}`);
        }
    </script>

</body>
</html>
