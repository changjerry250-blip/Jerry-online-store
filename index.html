<!DOCTYPE html>
<html lang="en">
<head>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script type="text/javascript">
   (function(){
      emailjs.init("YOUR_PUBLIC_KEY"); // Replace with your actual Public Key
   })();
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big J Online Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Big J Online Store</h1>
        <input type="text" id="searchInput" placeholder="Search snacks..." onkeyup="filterProducts()">
    </header>

    <div class="main-container">
        <div id="product-list" class="product-grid"></div>

        <div class="cart-sidebar">
            <h2>Your Cart</h2>
            <div id="cart-items-container">
                <p>Your cart is empty.</p>
            </div>
            <div class="cart-footer">
                <p>Total: <strong id="total-price">0</strong> NTD</p>
                <button class="place-order-btn" onclick="openCheckout()">Place Order</button>
                <button class="clear-btn" onclick="clearCart()">Clear All</button>
            </div>
        </div>
    </div>

    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <h3>Checkout</h3>
            <input type="email" id="customer-email" placeholder="Enter your email">
            <select id="payment-method">
                <option value="Line Pay">Line Pay</option>
                <option value="Credit Card">Credit Card</option>
                <option value="Cash">Cash on Delivery</option>
            </select>
            <div class="modal-buttons">
                <button onclick="processOrder()" class="confirm-btn">Confirm</button>
                <button onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
